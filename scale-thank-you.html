<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — Waves Digital</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFDF9; --ink:#15120D; --ink-soft:#4A4640;
    --b1:#03142E; --b3:#0660EB; --b5:#6FA8F7; --b6:#C7DCFB;
    --green:#1E7A4C; --amber:#B2611C; --line:#E8E1D3; --radius:28px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{max-width:480px;width:100%;background:#fff;border-radius:var(--radius);
    padding:44px 36px;box-shadow:0 30px 90px rgba(21,18,13,.10);text-align:center;}
  .icon{width:56px;height:56px;margin:0 auto 22px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;}
  .icon svg{width:26px;height:26px;}
  .icon.success{background:#E8F5EE;color:var(--green);}
  .icon.failed{background:#FBEEE4;color:var(--amber);}
  .icon.neutral{background:var(--b6);color:var(--b3);}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:25px;line-height:1.3;margin:0 0 12px;}
  p{font-size:15px;line-height:1.6;color:var(--ink-soft);margin:0 0 22px;}
  .wave{display:block;margin:0 auto 22px;width:100%;max-width:220px;}
  .ref{font-size:12px;color:var(--ink-soft);margin:-8px 0 22px;}
  .btn{display:block;width:100%;text-decoration:none;font-family:'DM Sans',sans-serif;
    font-weight:600;font-size:15px;border-radius:999px;padding:15px;cursor:pointer;
    box-sizing:border-box;}
  .btn-primary{background:var(--b3);color:#fff;margin-bottom:10px;}
  .btn-ghost{background:transparent;color:var(--ink-soft);font-size:13.5px;
    border:1.5px solid var(--line);}
  .brand{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.02em;
    color:var(--ink-soft);margin-top:28px;}
  .brand span{color:var(--b3);}
</style>
</head>
<body>
<div class="card" id="card"></div>

<script>
/* ====== CONFIG — fill these in ====== */
const CONFIG = {
  WHATSAPP_NUMBER: "91XXXXXXXXXX",  // your real WhatsApp business number, country code, no + or spaces
  SCALE_URL: "scale.html"           // your real Scale landing page
};

const params = new URLSearchParams(window.location.search);
const status = params.get("payment_status"); // "Credit" on success, something else on failure, null if visited directly
const paymentIdRaw = params.get("payment_id") || "";

function escapeHtml(s){
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
const paymentId = escapeHtml(paymentIdRaw);

function waLink(message){
  return "https://wa.me/" + CONFIG.WHATSAPP_NUMBER + "?text=" + encodeURIComponent(message);
}

const card = document.getElementById("card");

if (status === "Credit") {
  card.innerHTML = `
    <div class="icon success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1>Payment received \u2014 thank you</h1>
    <svg class="wave" viewBox="0 0 300 40" preserveAspectRatio="none">
      <path d="M0,20 C50,10 100,10 150,20 C200,30 250,30 300,20" fill="none" stroke="#0660EB" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <p>We'll send your copy of Scale straight to your WhatsApp shortly. Want it sooner? Message us now and we'll send it right away.</p>
    ${paymentId ? `<div class="ref">Reference: ${paymentId}</div>` : ""}
    <a class="btn btn-primary" href="${waLink('Hi, I just paid for Scale' + (paymentIdRaw ? ' (payment ID: ' + paymentIdRaw + ')' : '') + ' \u2014 could you send my copy here?')}" target="_blank">Message us on WhatsApp</a>
  `;
} else if (status) {
  // Any non-Credit status Instamojo sends back (e.g. "Failed")
  card.innerHTML = `
    <div class="icon failed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </div>
    <h1>That payment didn't go through</h1>
    <p>You haven't been charged. Sometimes this is just a bank or network hiccup \u2014 you're welcome to try again, or message us if anything looks off.</p>
    ${paymentId ? `<div class="ref">Reference: ${paymentId}</div>` : ""}
    <a class="btn btn-primary" href="${CONFIG.SCALE_URL}">Try again</a>
    <a class="btn btn-ghost" href="${waLink('Hi, I tried to pay for Scale but it didn\'t go through' + (paymentIdRaw ? ' (payment ID: ' + paymentIdRaw + ')' : '') + '. Can you help?')}" target="_blank">Or chat with us</a>
  `;
} else {
  // No payment params at all — someone just landed here directly
  card.innerHTML = `
    <div class="icon neutral">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
    </div>
    <h1>Looking for Scale?</h1>
    <p>This page is for after a payment \u2014 looks like you landed here directly. Head back to the Scale page to take a look.</p>
    <a class="btn btn-primary" href="${CONFIG.SCALE_URL}">Go to Scale</a>
    <a class="btn btn-ghost" href="${waLink('Hi, I\'m looking for the Scale guide.')}" target="_blank">Or chat with us</a>
  `;
}
</script>

<div style="text-align:center;"><div class="brand">Waves <span>Digital</span></div></div>
</body>
</html>
